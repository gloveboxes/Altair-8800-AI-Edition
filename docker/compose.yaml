services:
  altair8800v2:
    image: altair8800v2:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Always serves the browser terminal; run detached and open
    # http://localhost:8080/ (no TTY needed).
    restart: unless-stopped
    environment:
      ALTAIR_WEB_PORT: ${ALTAIR_WEB_PORT:-8080}
    ports:
      - "${ALTAIR_WEB_PORT:-8080}:${ALTAIR_WEB_PORT:-8080}"
    volumes:
      - type: bind
        source: ${ALTAIR_ENV_FILE:-./altair_env.txt}
        target: /opt/altair/runtime/altair_env.txt
        read_only: true
      - type: bind
        source: ${ALTAIR_APPS_DIR:-../Apps}
        target: /opt/altair/Apps
        read_only: true
      - type: bind
        source: ${ALTAIR_DISKS_DIR:-../disks}
        target: /opt/altair/disks
